name: verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Verify sequence snapshots
        run: python3 scripts/sync-sequence-snapshot.py --all --check
      - name: Test sequence snapshot renderer
        run: python3 scripts/test-sync-sequence-snapshot.py
      - name: Validate Observation Chronicle
        run: python3 scripts/validate-observation-chronicle.py
      - name: Test Observation Chronicle validator
        run: python3 scripts/test-observation-chronicle.py
      - name: Test mission continuity
        run: python3 scripts/test-mission-record.py
      - name: Test intervention reconciliation binding
        run: python3 scripts/test-intervention-reconciliation.py
      - name: Test Atthis workbench resolution
        run: python3 scripts/test-atthis.py
      - name: Test skill installation safety
        run: python3 scripts/test-probe-skill-installation.py
      - name: Install Cognition dependencies
        working-directory: packages/cognition
        run: bun install --frozen-lockfile
      - name: Install Work Cell dependencies
        working-directory: packages/work-cell
        run: bun install --frozen-lockfile
      - name: Install Autonomy dependencies
        working-directory: operations/autonomy
        run: bun install --frozen-lockfile
      - name: Typecheck Work Cell
        working-directory: packages/work-cell
        run: bun run typecheck
      - name: Test Work Cell
        working-directory: packages/work-cell
        run: bun test
      - name: Typecheck Autonomy
        working-directory: operations/autonomy
        run: bun run typecheck
      - name: Test Autonomy
        working-directory: operations/autonomy
        run: bun test
      - name: Typecheck Cognition
        working-directory: packages/cognition
        run: bun run typecheck
      - name: Test Cognition
        working-directory: packages/cognition
        run: bun test
      - name: Smoke-test Cognition CLI
        working-directory: packages/cognition
        run: ./src/cli.ts --help
      - name: Install site dependencies
        working-directory: site
        run: npm ci
      - name: Build site projection
        working-directory: site
        run: npm run build
      - name: Verify site links
        working-directory: site
        run: npm run verify:links
